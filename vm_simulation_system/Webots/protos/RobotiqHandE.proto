#VRML_SIM R2021a utf8
# tags: nonInteractive

PROTO RobotiqHandE [
  field SFVec3f    translation 0 0.0871 0
  field SFRotation rotation    0 1 0 1.71042267
  field SFString   name        "Robotiq Hand-E"
]
{
  Solid {
    translation IS translation
    rotation IS rotation
    name IS name
    
    children [
      # --- COUPLING ---
      Transform {
        # TWEAK THIS Y VALUE: Decrease this number (e.g., to 0, or -0.05, or -0.09) 
        # until the coupling visually slides down and rests flush against the UR3 wrist.
        translation 0 -0.0789 0 
        rotation 1 0 0 -1.5708  # Your correct rotation!
        scale 0.001 0.001 0.001
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.4 0.4 0.4 
              roughness 0.5
            }
            geometry Mesh {
              url [
                "meshes/Coupling.obj" 
              ]
            }
          }
        ]
      }

      # --- GRIPPER BASE ---
      Transform {
        translation 0 0.01396 0  # Updated to reflect the 2.94mm overlap!
        rotation 0 1 0 3.14159
        scale 0.001 0.001 0.001 
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.2 0.2 0.2
              roughness 0.6
            }
            geometry Mesh {
              url [
                "meshes/Hand-e Body.obj"
              ]
            }
          }
        ]
      }
      
      # --- FINGER 1 ---
      SliderJoint {
        jointParameters JointParameters {
          axis 0 0 1  
          minStop -0.001
          maxStop 0.025
          dampingConstant 2.0   # Absorbs the violent snapping energy
          staticFriction 0.5    # Stops gravity from slowly pulling it down
        }
        device [
          LinearMotor {
            name "finger1"
            maxVelocity 0.35
            maxForce 35
            controlPID 10 0 0
          }
          PositionSensor {
            name "finger1sensor"
          }
        ]
        endPoint Solid {
          name "finger1"
          contactMaterial "rubber"
          translation 0 0.01396 0  # Shifts the entire finger assembly up with the base
          children [
            Transform {
              scale 0.001 0.001 0.001 

              children [
                Shape {
                  appearance PBRAppearance { baseColor 0.8 0.8 0.8 }
                  geometry Mesh {
                    url [ "meshes/Hand-e Finger 1.obj" ]
                  }
                }
              ]
            }
          ]
          boundingObject Group {
            children [
              # PART 1: The Lower Finger Base
              Transform {
                translation 0 0.0218 -0.0328
                rotation 0 1 0 1.5708 
                children [
                  Box { size 0.006 0.01631 0.021 }
                ]
              }

              # --- PART 2: Angled Piece (Holding the pad) ---
              Transform {
                translation 0.0105 0.03 -0.0359 
                scale 0.001 0.001 0.001  
                rotation 0 0 1 1.5708
                children [
                  Shape {
                    geometry Mesh {
                      url [ "meshes/Angled_Gripper_Box.STL" ]
                    }
                  }
                ]
              }

              # PART 3: The Gripping Pad
              Transform {
                translation 0 0.05 -0.028  # (forward/back, left(negative)/right, up(negative)/down)
                rotation 0 1 0 1.5708 
                children [
                  Box { size 0.006 0.02 0.021 }
                ]
              }
            ]
          }
          physics Physics { 
              density -1
              mass 0.2
              centerOfMass [ 0 0 0 ] 
              damping Damping {
                linear 0.5
                angular 0.5
              }
          } 
        }
      }
      
      # --- FINGER 2 ---
      SliderJoint {
        jointParameters JointParameters {
          axis 0 0 -1  
          minStop -0.001
          maxStop 0.025
          dampingConstant 2.0   # Absorbs the violent snapping energy
          staticFriction 0.5    # Stops gravity from slowly pulling it down
        }
        device [
          LinearMotor {
            name "finger2"
            maxVelocity 0.35
            maxForce 35
            controlPID 10 0 0
          }
          PositionSensor {
            name "finger2sensor"
          }
        ]
        endPoint Solid {
          name "finger2"
          contactMaterial "rubber"
          translation 0 0.01396 0  # Shifts the entire finger assembly up with the base
          children [
            Transform {
              scale 0.001 0.001 0.001  
              children [
                Shape {
                  appearance PBRAppearance { baseColor 0.8 0.8 0.8 }
                  geometry Mesh {
                    url [ "meshes/Hand-e Finger 2.obj" ]
                  }
                }
              ]
            }
          ]
          boundingObject Group {
            children [
              # PART 1: The Lower Finger Base (Mirrored Z to positive 0.0328)
              Transform {
                translation 0 0.0218 0.0328
                rotation 0 1 0 1.5708 
                children [
                  Box { size 0.006 0.01631 0.021 }
                ]
              }

              # --- PART 2: Angled Piece (The Right Side) ---
              Transform {
                translation 0.0105 0.03 0.0250 
                scale 0.001 0.001 0.001  # Back to normal positive scale!
                rotation 0 0 1 1.5708
                children [
                  Shape {
                    geometry Mesh {
                      url [ "meshes/Angled_Gripper_Box_Mirrored.STL" ] # Pointing to the new file!
                    }
                  }
                ]
              }

              # PART 3: The Gripping Pad (Mirrored Z to positive 0.028)
              Transform {
                translation 0 0.05 0.028  
                rotation 0 1 0 1.5708 
                children [
                  Box { size 0.006 0.02 0.021 }
                ]
              }
            ]
          }
          physics Physics { 
              density -1
              mass 0.2
              centerOfMass [ 0 0 0 ]
              damping Damping {
                linear 0.5
                angular 0.5
              } 
          } 
        }
      }
    ]
    
    # Base physics and collisions (Now a Group containing the Coupling and Base)
    boundingObject Group {
      children [
        # Coupling Collision
        Transform {
          translation 0 -0.07748 0
          children [
            Cylinder {
              height 0.0169
              radius 0.0375  # 75mm diameter
            }
          ]
        }
        # Gripper Base Collision
        Transform {
          translation 0 -0.021 0  
          children [
            Cylinder {
              height 0.0959
              radius 0.0375  
            }
          ]
        }
      ]
    }
    physics Physics { 
              density -1
              mass 0.8 
          }
  }
}
